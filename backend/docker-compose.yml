# Local development database. Production runs elsewhere.
services:
  db:
    image: postgres:16
    container_name: tripinci_db
    environment:
      POSTGRES_DB: tripinci
      POSTGRES_USER: tripinci
      POSTGRES_PASSWORD: tripinci
    ports:
      - "5432:5432"
    volumes:
      - tripinci_pgdata:/var/lib/postgresql/data
      # Runs only on first init of the volume; creates the test database
      # alongside the main one.
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripinci -d tripinci"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  tripinci_pgdata:

name: frontend

# Type-check guard runs on every push/PR that touches app/.
# Deploy runs only on push to main, after the type-check passes.
# Cloudflare Pages serves the result at tripinci.pages.dev; the
# actual upload is done here via wrangler (Direct Upload mode) so
# we have a real API token with the right scopes.

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "app/**"
      - ".github/workflows/frontend.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install deps
        # openapi-typescript declares a peer on TS ^5; we're on TS 6.
        run: npm install --legacy-peer-deps

      - name: Type-check
        run: npx tsc --noEmit

  deploy:
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency: deploy-frontend
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install deps
        run: npm install --legacy-peer-deps

      - name: Build web
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_API_URL: https://tripinci-api.fly.dev

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name tripinci
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

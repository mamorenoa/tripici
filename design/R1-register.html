<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tripinci - Create Account</title>
<!-- Tailwind CSS with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Font: Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Theme Configuration -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-primary": "#6bd8cb",
                    "tertiary-fixed": "#ffdbce",
                    "inverse-on-surface": "#edf2f0",
                    "background": "#f5faf8",
                    "surface-bright": "#f5faf8",
                    "surface-container-highest": "#dee4e1",
                    "surface-tint": "#006a61",
                    "error-container": "#ffdad6",
                    "on-primary-container": "#f4fffc",
                    "secondary-container": "#e0e3e5",
                    "on-primary-fixed": "#00201d",
                    "surface-variant": "#dee4e1",
                    "on-tertiary-fixed-variant": "#773215",
                    "tertiary-fixed-dim": "#ffb59a",
                    "on-primary-fixed-variant": "#005049",
                    "inverse-surface": "#2c3130",
                    "surface": "#f5faf8",
                    "secondary-fixed-dim": "#c4c7c9",
                    "outline": "#6d7a77",
                    "on-primary": "#ffffff",
                    "on-error": "#ffffff",
                    "on-tertiary-container": "#fffbff",
                    "on-background": "#171d1c",
                    "on-tertiary-fixed": "#370e00",
                    "outline-variant": "#bcc9c6",
                    "on-secondary": "#ffffff",
                    "on-surface": "#171d1c",
                    "on-tertiary": "#ffffff",
                    "surface-container-low": "#f0f5f2",
                    "error": "#ba1a1a",
                    "primary-fixed-dim": "#6bd8cb",
                    "on-secondary-fixed": "#191c1e",
                    "surface-container": "#eaefed",
                    "primary-container": "#008378",
                    "surface-container-lowest": "#ffffff",
                    "tertiary": "#924628",
                    "surface-container-high": "#e4e9e7",
                    "secondary-fixed": "#e0e3e5",
                    "primary": "#00685f",
                    "primary-fixed": "#89f5e7",
                    "on-secondary-container": "#626567",
                    "tertiary-container": "#b05e3d",
                    "on-surface-variant": "#3d4947",
                    "secondary": "#5c5f61"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-gap": "1rem",
                    "edge-margin": "1.25rem",
                    "section-gap": "2rem",
                    "inline-gap": "0.75rem",
                    "container-max": "390px"
            },
            "fontFamily": {
                    "title": ["Inter", "sans-serif"],
                    "label": ["Inter", "sans-serif"],
                    "heading": ["Inter", "sans-serif"],
                    "caption": ["Inter", "sans-serif"],
                    "body": ["Inter", "sans-serif"]
            },
            "fontSize": {
                    "title": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "heading": ["18px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "caption": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500"}],
                    "body": ["16px", {"lineHeight": "24px", "letterSpacing": "0em", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        /* Hide scrollbar for cleaner look */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Shell Container: Centered on desktop, full mobile width -->
<main class="flex flex-col min-h-screen w-full max-w-[390px] mx-auto bg-background px-edge-margin py-12 gap-section-gap">
<!-- Top Section: Branded Logo & Tagline -->
<header class="flex flex-col items-center gap-2 text-center pt-8">
<div class="flex items-center gap-2 text-primary">
<span class="material-symbols-outlined text-[32px]">travel_explore</span>
<h1 class="font-title text-title tracking-tight text-primary">Tripinci</h1>
</div>
<p class="font-caption text-caption text-on-surface-variant">Simplify shared expenses, multiply the fun.</p>
</header>
<!-- Main Content Card -->
<section class="flex flex-col gap-stack-gap">
<div class="bg-surface-container-lowest border border-outline-variant rounded-2xl p-6 shadow-sm flex flex-col gap-6">
<!-- Welcome Text -->
<div class="flex flex-col gap-1">
<h2 class="font-heading text-heading text-on-surface">Create account</h2>
<p class="font-caption text-caption text-on-surface-variant">Join your travel partners today.</p>
</div>
<!-- Form Fields -->
<form class="flex flex-col gap-5">
<!-- Display Name Field -->
<div class="flex flex-col gap-1.5">
<label class="font-label text-label text-on-surface-variant uppercase" for="display-name">Display name</label>
<input class="bg-surface-container-lowest border border-outline-variant rounded-xl h-11 px-4 text-on-surface focus:border-primary focus:ring-0 transition-colors placeholder:text-outline-variant outline-none" id="display-name" placeholder="Alex Rivers" type="text"/>
</div>
<!-- Email Field -->
<div class="flex flex-col gap-1.5">
<label class="font-label text-label text-on-surface-variant uppercase" for="email">Email address</label>
<input class="bg-surface-container-lowest border border-outline-variant rounded-xl h-11 px-4 text-on-surface focus:border-primary focus:ring-0 transition-colors placeholder:text-outline-variant outline-none" id="email" placeholder="alex@example.com" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-1.5">
<label class="font-label text-label text-on-surface-variant uppercase" for="password">Password</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl h-11 px-4 text-on-surface focus:border-primary focus:ring-0 transition-colors placeholder:text-outline-variant outline-none" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
<p class="font-caption text-[12px] leading-[16px] text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">info</span>
                            At least 8 characters.
                        </p>
</div>
<!-- Action Button -->
<button class="w-full bg-primary text-on-primary font-heading text-body h-12 rounded-2xl mt-4 active:scale-[0.98] transition-transform flex items-center justify-center hover:opacity-90 shadow-md" type="submit">
                        Sign up
                    </button>
</form>
</div>
<!-- Social/Alternative Divider (Subtle) -->
<div class="flex items-center gap-4 px-2">
<div class="h-[1px] flex-1 bg-outline-variant"></div>
<span class="font-label text-label text-outline uppercase tracking-widest">or</span>
<div class="h-[1px] flex-1 bg-outline-variant"></div>
</div>
<!-- Social Sign Up (Ghost style) -->
<button class="flex items-center justify-center gap-3 w-full border border-outline-variant bg-surface-container-lowest rounded-xl h-11 text-on-surface font-caption text-caption hover:bg-surface-container-low transition-colors">
<svg fill="none" height="18" viewbox="0 0 24 24" width="18" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-5.38z" fill="#EA4335"></path>
</svg>
                Continue with Google
            </button>
</section>
<!-- Footer -->
<footer class="mt-auto flex justify-center items-center py-6">
<p class="font-body text-caption text-on-surface-variant">
                Already have an account? 
                <a class="text-primary font-heading hover:underline underline-offset-4 ml-1" href="#">Sign in</a>
</p>
</footer>
</main>
<!-- JavaScript for minor field interactions -->
<script>
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });

        // Simple Toggle for password visibility
        const toggleBtn = document.querySelector('button[type="button"]');
        const passwordInput = document.querySelector('#password');
        
        if(toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                const isPassword = passwordInput.type === 'password';
                passwordInput.type = isPassword ? 'text' : 'password';
                toggleBtn.querySelector('span').innerText = isPassword ? 'visibility_off' : 'visibility';
            });
        }
    </script>
</body></html>
